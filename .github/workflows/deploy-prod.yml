name: Deploy PROD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend
        run: |
          docker build -t uceconnect/backend:latest ./backend
          docker push uceconnect/backend:latest

      - name: Build & Push Frontend
        run: |
          docker build -t uceconnect/frontend:latest ./frontend
          docker push uceconnect/frontend:latest

      - name: Deploy en EC2 PROD
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.PROD_EC2_KEY }}
          script: |
            cd /home/ubuntu/uceconnect
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d