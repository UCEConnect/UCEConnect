# deploy-prod.yml — Pipeline PROD para UCEConnect
# Trigger: push a rama main (requiere aprobación del inge)
# Flujo: build imágenes → push Docker Hub → deploy EC2 PROD

name: Deploy PROD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Generar tag con fecha y commit
        id: tag
        run: |
          echo "IMAGE_TAG=prod-$(date +'%Y%m%d')-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.backend
          push: true
          tags: |
            uceconnect/backend:prod
            uceconnect/backend:${{ steps.tag.outputs.IMAGE_TAG }}

      - name: Build y push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            uceconnect/frontend:prod
            uceconnect/frontend:${{ steps.tag.outputs.IMAGE_TAG }}

  deploy-prod:
    name: Deploy en EC2 PROD
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Copiar docker-compose.prod.yml al EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.PROD_EC2_KEY }}
          source: "docker-compose.prod.yml"
          target: "/home/ubuntu/uceconnect"

      - name: Deploy en EC2 PROD
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.PROD_EC2_KEY }}
          script: |
            cd /home/ubuntu/uceconnect
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f