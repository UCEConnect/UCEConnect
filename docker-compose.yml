version: '3.8'
services:
  backend:
    image: node:18-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DB_HOST=db
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: uceconnect_db
      POSTGRES_USER: uceconnect_admin
      POSTGRES_PASSWORD: uceconnect_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
